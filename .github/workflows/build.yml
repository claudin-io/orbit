name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: orbit-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: orbit-aarch64-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: orbit-arm64-macos
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: orbit-x86_64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: orbit-x86_64-windows.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          mm=$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([0-9]+\.[0-9]+).*/\1/')
          ver="${mm}.$(date +%y%m%d).${{ github.run_number }}"
          echo "ORBIT_VERSION=${ver}" >> "$GITHUB_ENV"
          echo "tag=v${ver}" >> "$GITHUB_OUTPUT"

      - name: Build release
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          args: "--release"
          strip: true

      - name: Rename binary
        shell: bash
        run: |
          ext=""
          [ "${{ matrix.os }}" = "windows-latest" ] && ext=".exe"
          mv "target/${{ matrix.target }}/release/orbit${ext}" "target/${{ matrix.target }}/release/${{ matrix.asset }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: target/${{ matrix.target }}/release/${{ matrix.asset }}
          make_latest: true
          fail_on_unmatched_files: false
