name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: macos-latest
            target: arm64-macos
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Compute version
        id: version
        run: echo "tag=v0.2.$(date +%Y%m%d)-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build release
        run: cargo build --release

      - name: Rename binary
        run: mv target/release/orbit target/release/orbit-${{ matrix.target }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: target/release/orbit-${{ matrix.target }}
          make_latest: true
          fail_on_unmatched_files: false
